<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container py-4 parent">
    <div class="card shadow border-0">

        <!-- Header -->
        <div class="card-header bg-primary text-white py-3">
            <h3 class="mb-0">Enquiry Management Form</h3>
            <small>Create and manage customer enquiries</small>
        </div>

        <div class="card-body">

            <form>

                <!-- ================= Customer Information ================= -->
                <div class="border rounded p-3 mb-4">
                    <h5 class="text-primary mb-3">
                        Customer Information
                    </h5>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                 Name
                            </label>
                            <input
                                type="text"
                                [(ngModel)]="newEnquiryObj.customerName" name="customerName"
                                class="form-control"
                                placeholder="Enter customer name">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Email Address
                            </label>
                            <input
                                type="email"
                                [(ngModel)]="newEnquiryObj.customerEmail"
                                name="customerEmail"
                                class="form-control"
                                placeholder="example@gmail.com">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Phone Number
                            </label>
                            <input
                                type="tel"
                                [(ngModel)]="newEnquiryObj.customerPhone"
                                name="customerPhone"
                                class="form-control"
                                placeholder="+91 9876543210">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Enquiry Date
                            </label>
                            <input
                                type="datetime-local"
                                [(ngModel)]="newEnquiryObj.enquiryDate"
                                name="enquiryDate"
                                class="form-control">
                        </div>

                    </div>
                </div>

                <!-- ================= Enquiry Information ================= -->
                <div class="border rounded p-3 mb-4">
                    <h5 class="text-success mb-3">
                        Enquiry Information
                    </h5>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Category
                            </label>

                            <select
                                class="form-select"
                                [(ngModel)]="newEnquiryObj.categoryId"
                                name="categoryId">
                                <option selected disabled>
                                    Select Category
                                </option>
                                @for (item of categoryList; track $index) {
                                    <option [value]="item.categoryId">
                                        {{ item.categoryName }}
                                    </option>
                                }
                                <option value="1">
                                    Product Inquiry
                                </option>
                                <option value="2">
                                    Service Inquiry
                                </option>
                                <option value="3">
                                    Technical Support
                                </option>
                                <option value="4">
                                    Complaint
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Enquiry Type
                            </label>

                            <select
                                class="form-select"
                                [(ngModel)]="newEnquiryObj.enquiryType"
                                name="enquiryType">
                                <option selected disabled>
                                    Select Type
                                </option>
                                <option>Email</option>
                                <option>Phone Call</option>
                                <option>Website</option>
                                <option>Walk-In</option>
                                <option>Social Media</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                Message
                            </label>

                            <textarea
                                rows="5"
                                [(ngModel)]="newEnquiryObj.message"
                                name="message"
                                class="form-control"
                                placeholder="Describe customer enquiry here..."></textarea>
                        </div>

                    </div>
                </div>

                <!-- ================= Follow Up ================= -->
                <div class="border rounded p-3 mb-4">
                    <h5 class="text-warning mb-3">
                        Follow Up & Status
                    </h5>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Status
                            </label>

                            <select
                                class="form-select"
                                [(ngModel)]="newEnquiryObj.statusId"
                                name="statusId">
                                <option selected disabled>
                                    Select Status
                                </option>
                                @for (item of statusList; track $index) {
                                    <option [value]="item.statusId">
                                        {{ item.statusName }}
                                    </option>
                                }
                            
                                
                                <option value="2">
                                    In Progress
                                </option>
                                <option value="3">
                                    Follow Up Pending
                                </option>
                                <option value="4">
                                    Closed
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Follow Up Date
                            </label>

                            <input
                                type="datetime-local"
                                [(ngModel)]="newEnquiryObj.followUpDate"
                                name="followUpDate"
                                class="form-control">
                        </div>

                    </div>
                </div>

                <!-- ================= Feedback ================= -->
                <div class="border rounded p-3 mb-4">
                    <h5 class="text-danger mb-3">
                        Feedback & Conversion
                    </h5>

                    <div class="row">

                        <div class="col-12 mb-3">
                            <label class="form-label">
                                Feedback
                            </label>

                            <textarea
                                rows="4"
                                [(ngModel)]="newEnquiryObj.feedback"
                                name="feedback"
                                class="form-control"
                                placeholder="Enter customer feedback..."></textarea>
                        </div>

                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="isConverted"
                                    [(ngModel)]="newEnquiryObj.isConverted"
                                    name="isConverted">

                                <label
                                    class="form-check-label"
                                    for="isConverted">
                                    Convert to Customer
                                </label>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex justify-content-end gap-2">

                    <button
                        type="submit"
                        class="btn btn-primary"
                        type="button" (click)="saveEnquiry()">
                        Save Enquiry
                    </button>

                      <button
                        type="reset"
                        class="btn btn-outline-secondary"
                        type="button">
                        Reset
                    </button>

                </div>

            </form>

        </div>
    </div>
</div>
